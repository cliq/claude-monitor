name: ClaudeMonitor
options:
  bundleIdPrefix: com.cliqconsulting.claudemonitor
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "1"
    # Default off for fast local iteration (no TCC prompts when driving Terminal).
    # The release workflow overrides this to YES for notarization.
    ENABLE_HARDENED_RUNTIME: NO
targets:
  ClaudeMonitor:
    type: application
    platform: macOS
    configFiles:
      Debug: Configuration/Base.xcconfig
      Release: Configuration/Base.xcconfig
    sources:
      - path: App
      - path: scripts/hook.sh
        buildPhase: resources
    info:
      path: App/Info.plist
      properties:
        LSUIElement: false
        NSAppleEventsUsageDescription: "Claude Monitor uses Apple events to focus the Terminal.app or iTerm2 tab of a selected Claude Code session."
        NSHumanReadableCopyright: "Copyright © 2026 Cliq Consulting LLC. All rights reserved."
        # actool emits `AppIcon.icns` into Contents/Resources but its generated partial
        # Info.plist isn't merged when `INFOPLIST_FILE` is a static path, so declare
        # the icon reference explicitly here. `CFBundleIconFile` is the legacy macOS
        # key (`.icns` filename without extension); `CFBundleIconName` is the modern
        # asset-catalog-aware key. Both point at the same name; Finder/Dock use them.
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
    settings:
      base:
        PRODUCT_NAME: ClaudeMonitor
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: App/ClaudeMonitor.entitlements
  ClaudeMonitorTests:
    type: bundle.unit-test
    platform: macOS
    configFiles:
      Debug: Configuration/Base.xcconfig
      Release: Configuration/Base.xcconfig
    sources:
      - path: Tests
      - path: scripts/hook.sh
        buildPhase: resources
      - path: Tests/Fixtures
        buildPhase: resources
    dependencies:
      - target: ClaudeMonitor
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID).tests
  ClaudeMonitorIntegrationTests:
    type: bundle.unit-test
    platform: macOS
    configFiles:
      Debug: Configuration/Base.xcconfig
      Release: Configuration/Base.xcconfig
    sources:
      - path: IntegrationTests
    dependencies:
      - target: ClaudeMonitor
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID).integration-tests
  ClaudeMonitorUITests:
    type: bundle.ui-testing
    platform: macOS
    configFiles:
      Debug: Configuration/Base.xcconfig
      Release: Configuration/Base.xcconfig
    sources:
      - path: UITests
    dependencies:
      - target: ClaudeMonitor
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID).ui-tests
