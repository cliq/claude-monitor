name: ClaudeMonitor
options:
  bundleIdPrefix: com.cliqconsulting.claudemonitor
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: NO
targets:
  ClaudeMonitor:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: scripts/hook.sh
        buildPhase: resources
    info:
      path: App/Info.plist
      properties:
        LSUIElement: false
        NSAppleEventsUsageDescription: "Claude Monitor uses Apple events to focus the Terminal.app or iTerm2 tab of a selected Claude Code session."
        # actool emits `AppIcon.icns` into Contents/Resources but its generated partial
        # Info.plist isn't merged when `INFOPLIST_FILE` is a static path, so declare
        # the icon reference explicitly here. `CFBundleIconFile` is the legacy macOS
        # key (`.icns` filename without extension); `CFBundleIconName` is the modern
        # asset-catalog-aware key. Both point at the same name; Finder/Dock use them.
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
    settings:
      base:
        PRODUCT_NAME: ClaudeMonitor
        PRODUCT_BUNDLE_IDENTIFIER: com.cliqconsulting.claudemonitor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  ClaudeMonitorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: scripts/hook.sh
        buildPhase: resources
      - path: Tests/Fixtures
        buildPhase: resources
    dependencies:
      - target: ClaudeMonitor
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  ClaudeMonitorIntegrationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: IntegrationTests
    dependencies:
      - target: ClaudeMonitor
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  ClaudeMonitorUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UITests
    dependencies:
      - target: ClaudeMonitor
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
