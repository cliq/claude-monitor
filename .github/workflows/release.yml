name: Release

# Tag a commit on main (`git tag -a vX.Y -m "vX.Y" && git push origin vX.Y`) and this
# workflow produces a signed + notarized ClaudeMonitor.dmg attached to a GitHub Release.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#
#   BUILD_CERTIFICATE_BASE64   Developer ID Application .p12 exported from Keychain, base64-encoded.
#                                security export + `base64 -i dev-id.p12 | pbcopy`
#   P12_PASSWORD               Password set on the .p12 when exported.
#   KEYCHAIN_PASSWORD          Any string; used to unlock the throwaway keychain on the runner.
#   TEAM_ID                    10-char Apple Developer Team ID (e.g. ABCDE12345).
#   NOTARY_KEY_BASE64          App Store Connect API key .p8, base64-encoded.
#   NOTARY_KEY_ID              API key ID (10 chars, printed next to the key in ASC).
#   NOTARY_ISSUER_ID           API key issuer UUID (top of the Keys tab in ASC).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select newest available Xcode
        run: |
          set -euo pipefail
          for candidate in \
            /Applications/Xcode_26.3.app \
            /Applications/Xcode_26.2.app \
            /Applications/Xcode_26.1.app \
            /Applications/Xcode_26.0.app \
            /Applications/Xcode.app; do
            if [ -d "$candidate" ]; then
              echo "Using $candidate"
              sudo xcode-select -s "$candidate"
              break
            fi
          done
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: make gen

      - name: Derive version from tag
        id: version
        run: |
          REF="${GITHUB_REF##*/}"
          VERSION="${REF#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag ${REF} → version ${VERSION}"

      - name: Import Developer ID certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/developer_id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

      - name: Archive
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
          MARKETING_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          xcodebuild -project ClaudeMonitor.xcodeproj \
            -scheme ClaudeMonitor \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath build/ClaudeMonitor.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            archive

      - name: Export signed .app
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>developer-id</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/ClaudeMonitor.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Build DMG
        run: |
          set -euo pipefail
          brew install create-dmg imagemagick
          # Solid background with a large grey arrow that sits between the app
          # icon and the `Applications` drop target in the final window.
          magick -size 600x400 xc:'#f5f5f7' \
            -fill '#8e8e93' -pointsize 110 -gravity Center -annotate +0-10 $'→' \
            build/dmg-background.png
          rm -f build/ClaudeMonitor.dmg build/rw.*.dmg
          # `create-dmg` sometimes exits with `-43` on the final UDZO conversion
          # even though the styled read-write image it leaves behind is fine.
          # When that happens, finish the job with `hdiutil convert` ourselves.
          if ! create-dmg \
            --volname "ClaudeMonitor" \
            --volicon "build/export/ClaudeMonitor.app/Contents/Resources/AppIcon.icns" \
            --background "build/dmg-background.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "ClaudeMonitor.app" 150 200 \
            --app-drop-link 450 200 \
            --hide-extension "ClaudeMonitor.app" \
            --no-internet-enable \
            build/ClaudeMonitor.dmg \
            build/export/ClaudeMonitor.app; then
            RW_DMG=$(ls build/rw.*.dmg 2>/dev/null | head -1)
            test -n "$RW_DMG" || { echo "create-dmg failed with no recoverable intermediate"; exit 1; }
            hdiutil convert "$RW_DMG" -format UDZO -o build/ClaudeMonitor.dmg
          fi
          rm -f build/rw.*.dmg
          test -f build/ClaudeMonitor.dmg

      - name: Notarize DMG
        env:
          NOTARY_KEY_BASE64: ${{ secrets.NOTARY_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo -n "$NOTARY_KEY_BASE64" | base64 --decode -o "$KEY_PATH"
          xcrun notarytool submit build/ClaudeMonitor.dmg \
            --key "$KEY_PATH" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple build/ClaudeMonitor.dmg
          xcrun stapler validate build/ClaudeMonitor.dmg

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/ClaudeMonitor.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeMonitor-dmg
          path: build/ClaudeMonitor.dmg
          if-no-files-found: error
